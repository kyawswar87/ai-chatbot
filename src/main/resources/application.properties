spring.application.name=ai-chatbot

# --- PostgreSQL datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5433/chatbot
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

# --- Ollama chat (RAG generation) ---
spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=mistral

# --- Ollama embeddings ---
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.model=bge-m3
# Auto-pull the embedding model on startup if missing
spring.ai.ollama.init.pull-model-strategy=when_missing
spring.ai.ollama.init.embedding.include=true

# --- PgVector vector store ---
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.table-name=vector_store

# --- Document ingestion: scheduled auto-sync (off by default) ---
ingestion.schedule.enabled=${INGEST_SCHEDULE_ENABLED:false}
ingestion.schedule.cron=${INGEST_SCHEDULE_CRON:0 0 * * * *}
# Comma-separated URLs re-synced on the cron, e.g. INGEST_SCHEDULE_URLS=https://a,https://b
ingestion.schedule.urls=${INGEST_SCHEDULE_URLS:}

# --- Document ingestion: SFTP (PDF/Word via Tika) ---
ingestion.sftp.host=${SFTP_HOST:localhost}
ingestion.sftp.port=${SFTP_PORT:2222}
ingestion.sftp.username=${SFTP_USERNAME:demo}
ingestion.sftp.password=${SFTP_PASSWORD:demo}
ingestion.sftp.private-key=${SFTP_PRIVATE_KEY:}
ingestion.sftp.private-key-passphrase=${SFTP_PRIVATE_KEY_PASSPHRASE:}
ingestion.sftp.remote-dir=${SFTP_REMOTE_DIR:/docs}
ingestion.sftp.file-extensions=${SFTP_FILE_EXTENSIONS:pdf,doc,docx,md}

# --- Document ingestion: Notion ---
ingestion.notion.token=${NOTION_TOKEN:}
ingestion.notion.version=${NOTION_VERSION:2022-06-28}
ingestion.notion.page-ids=${NOTION_PAGE_IDS:}

# --- Spring AI request/response logging ---
logging.level.org.springframework.web=DEBUG
# Ollama chat/embedding calls Spring AI makes (model, options, timing).
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.ollama=DEBUG
# Advisor pipeline: shows the QuestionAnswerAdvisor rewriting the user prompt
# (retrieved context injected into {question_answer_context}).
logging.level.org.springframework.ai.chat.client.advisor=DEBUG